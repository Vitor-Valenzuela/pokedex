<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Links -->
  <link rel="icon" href="./favicons/favicon-16x16.png">
  <link rel="stylesheet" href="./css/style.css">

  <!-- Main JS -->
  <script defer src="./js/script.js"></script>

  <title>Pokédex</title>
</head>
<body>
  
  <main>
    <div class="loading" style="display: none;">
      <div class="spinner"></div>
    </div>
    <img src="#" alt="pokemon" class="pokemon__image">

    <h1 class="pokemon__data">
      <span class="pokemon__number"></span> -
      <span class="pokemon__name"></span>
    </h1>

    <div class="pokemon__types"></div>

    <div class="pokemon__info">
      <p class="pokemon__height"></p>
      <p class="pokemon__weight"></p>
      <p class="pokemon__abilities"></p>
    </div>

    <form class="form">
      <input
        type="search"
        class="input__search"
        placeholder="Nome ou Número"
        required
      />
    </form>

    <div class="buttons">
      <button class="button btn-prev">Ant </button>
      <button class="button btn-random">Aleat</button>
      <button class="button btn-shiny">Alt</button>
      <button class="button btn-next">Prox </button>
    </div>

    <img src="./images/pokedex.png" alt="pokedex" class="pokedex">
  </main>

  <div class="pokemon__stats">
    <div class="stat">
      <span class="stat__name">Pontos de Vida</span>
      <div class="stat__bar">
        <div class="stat__fill hp"></div>
      </div>
      <span class="stat__value"></span>
    </div>
    <div class="stat">
      <span class="stat__name">Ataque</span>
      <div class="stat__bar">
        <div class="stat__fill atk"></div>
      </div>
      <span class="stat__value"></span>
    </div>
    <div class="stat">
      <span class="stat__name">Defesa</span>
      <div class="stat__bar">
        <div class="stat__fill def"></div>
      </div>
      <span class="stat__value"></span>
    </div>
    <div class="stat">
      <span class="stat__name">Ataque Especial</span>
      <div class="stat__bar">
        <div class="stat__fill sp-atk"></div>
      </div>
      <span class="stat__value"></span>
    </div>
    <div class="stat">
      <span class="stat__name">Defesa Especial</span>
      <div class="stat__bar">
        <div class="stat__fill sp-def"></div>
      </div>
      <span class="stat__value"></span>
    </div>
    <div class="stat">
      <span class="stat__name">Velocidade</span>
      <div class="stat__bar">
        <div class="stat__fill speed"></div>
      </div>
      <span class="stat__value"></span>
    </div>
  </div>

</body>
</html>
